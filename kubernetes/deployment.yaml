---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask
          image: ## Добавить образ из GHCR
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            request:
              memory: "64Mi"
              cpu: "250m"
          ports:
            - containerPort: 8080
